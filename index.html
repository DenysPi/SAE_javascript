<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeu de Memory</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/app.js" type="module"></script>
</head>
<body>
<header><h1>Jeu de Memory</h1></header>

<div class="setup-form">
  <h2>Démarrer une nouvelle partie</h2>

  <form class="game-form" action="">
    <label for="name">Nom du joueur: </label>
    <input type="text" id="name" name="name" required>



    <label for="diffuculty">Niveau De Difficulté : </label>
    
    <select name="diffuculty" id="difficulty">
      <option value="1">Facile</option>
      <option value="2">Moyen</option>
      <option value="3">Difficile</option>
    </select>

    <label for="collection">Collection d'images :</label>
    <select id="collection" name="collection">
      <option value="animals">animals</option>
      <option value="fruits">fruits</option>
      <option value="cars">cars</option>
    </select>

    <button type="submit">Jouer</button>
  </form>
</div>
